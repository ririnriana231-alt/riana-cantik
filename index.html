<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Buat Kamu ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0104;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transition: opacity 1.5s ease;
        }

        /* LAYAR 1: Animasi & Teks */
        .screen-1 {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 85%;
            width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1.5s ease;
        }

        .screen-1 h1 {
            color: #ff6584;
            font-size: 1.6rem;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 101, 132, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease;
        }

        .screen-1 p {
            color: #ffe3e8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease 0.8s;
        }

        .btn-next {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(45deg, #ff6584, #ff416c);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease 1.5s;
            pointer-events: none;
        }

        .btn-next:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.6);
        }

        /* Trigger Tampil Layar 1 */
        .show-text h1, .show-text p {
            opacity: 1;
            transform: translateY(0);
        }

        .show-text .btn-next {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* LAYAR 2: Galeri Foto */
        .screen-2 {
            position: absolute;
            z-index: 20;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .gallery-title {
            color: #ff6584;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 101, 132, 0.5);
        }

        /* Susunan Grid Foto */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        /* Frame Foto Polaroid Kecil */
        .photo-card {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
            transition: transform 0.5s ease;
        }

        /* Efek miring-miring estetik acak tiap foto */
        .photo-card:nth-child(odd) { transform: rotate(-3deg); }
        .photo-card:nth-child(even) { transform: rotate(4deg); }
        .photo-card:hover { transform: scale(1.08) rotate(0deg); z-index: 5; }

        .photo-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 2px;
        }

        /* Sistem Transisi Halaman (Saat Tombol Diklik) */
        .fade-out {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .fade-in {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="screen-1" id="screen1">
        <h1>Untuk Pacarku yang Paling Lucu 💖</h1>
        <p>Sama seperti bintik bintang ini yang tahu ke mana harus berjalan untuk membentuk cinta, dan mekar menjadi bunga yang indah... seperti itulah hatiku sejak ada kamu. 🌹</p>
        <button class="btn-next" onclick="bukaHalamanDua()">Klik untuk Lihat Kejutan ✨</button>
    </div>

    <div class="screen-2" id="screen2">
        <h2 class="gallery-title">Galeri Orang Terlucu Sedunia 🌸</h2>
        
        <div class="gallery-grid">
            <div class="photo-card">
                <img src="../IMG-20260623-WA0030.jpg" alt="Foto 1">
            </div>
            
            <div class="photo-card">
                <img src="https://i.ibb.co/VWV0Vpnd/b6891ebc-473d-4953-b184-7a9177a67f08.jpg" alt="Foto 2">
            </div>

            <div class="photo-card">
                <img src="https://i.ibb.co/VWV0Vpnd/b6891ebc-473d-4953-b184-7a9177a67f08.jpg" alt="Foto 3">
            </div>

            <div class="photo-card">
                <img src="https://i.ibb.co/VWV0Vpnd/b6891ebc-473d-4953-b184-7a9177a67f08.jpg" alt="Foto 4">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const screen1 = document.getElementById('screen1');
        const screen2 = document.getElementById('screen2');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const numParticles = 500; 
        const particles = [];
        let animationState = 0; 

        // Alur Waktu Otomatis Halaman Pertama
        setTimeout(() => { animationState = 1; }, 2500);  // Jadi Love Pink
        setTimeout(() => { animationState = 2; }, 6500);  // Jadi Bunga Mawar
        setTimeout(() => { screen1.classList.add('show-text'); }, 9500); // Tombol & teks muncul

        // FUNGSI PINDAH KE HALAMAN 2
        function bukaHalamanDua() {
            screen1.classList.add('fade-out'); // Sembunyikan halaman 1
            canvas.classList.add('fade-out');  // Sembunyikan partikel mawar agar fokus ke foto
            
            setTimeout(() => {
                screen2.classList.add('fade-in'); // Munculkan galeri foto penuh
            }, 1000);
        }

        // --- Rumus Matematika Bentuk ---
        function getHeartPoint(t) {
            const scale = 12; 
            const x = scale * 16 * Math.pow(Math.sin(t), 3);
            const y = -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x + width / 2, y: y + height / 2 - 90 }; 
        }

        function getFlowerPoint(t, index) {
            let x, y;
            if (index % 6 === 0) {
                x = (index % 12 - 6) * 1.5;
                y = (index % 40) * 4 + 40; 
            } else {
                const k = 5; 
                const r = 140 * Math.sin(k * t); 
                x = r * Math.cos(t);
                y = r * Math.sin(t) - 30;
            }
            return { x: x + width / 2, y: y + height / 2 - 100 };
        }

        // --- Blueprint Partikel ---
        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1.2;
                this.speed = Math.random() * 0.03 + 0.02;
                this.color = { r: 240, g: 240, b: 245, a: 0.5 };
                this.t = (index / numParticles) * Math.PI * 2;
            }

            update() {
                let targetX, targetY;
                let targetColor = { r: 240, g: 240, b: 245, a: 0.5 };

                if (animationState === 0) {
                    this.x += Math.sin(this.index + Date.now() * 0.0015) * 0.4;
                    this.y += Math.cos(this.index + Date.now() * 0.0015) * 0.4;
                    return;
                } 
                else if (animationState === 1) {
                    const target = getHeartPoint(this.t);
                    targetX = target.x;
                    targetY = target.y;
                    targetColor = { r: 255, g: 20, b: 147, a: 0.85 }; 
                } 
                else if (animationState === 2) {
                    const target = getFlowerPoint(this.t, this.index);
                    targetX = target.x;
                    targetY = target.y;

                    if (this.index % 6 === 0) {
                        targetColor = { r: 46, g: 139, b: 87, a: 0.8 };
                    } else {
                        targetColor = { r: 230, g: 15, b: 60, a: 0.9 };
                    }
                }

                this.x += (targetX - this.x) * this.speed;
                this.y += (targetY - this.y) * this.speed;

                this.color.r += (targetColor.r - this.color.r) * 0.05;
                this.color.g += (targetColor.g - this.color.g) * 0.05;
                this.color.b += (targetColor.b - this.color.b) * 0.05;
                this.color.a += (targetColor.a - this.color.a) * 0.05;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${Math.floor(this.color.r)}, ${Math.floor(this.color.g)}, ${Math.floor(this.color.b)}, ${this.color.a})`;
                
                if (animationState > 0) {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fill();
            }
        }

        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle(i));
        }

        function animate() {
            ctx.fillStyle = 'rgba(11, 1, 4, 0.25)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
