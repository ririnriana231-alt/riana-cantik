<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Buat Kamu ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0104;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 85%;
            width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #ff6584;
            font-size: 1.6rem;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 101, 132, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease;
        }

        p {
            color: #ffe3e8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease 0.8s;
        }

        /* Gaya Tombol Link Foto */
        .photo-link {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(45deg, #ff6584, #ff416c);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease 1.5s; /* Muncul paling akhir setelah teks */
            pointer-events: none; /* Belum bisa diklik sebelum muncul */
        }

        /* Efek Hover saat tombol disentuh/diklik */
        .photo-link:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.6);
            background: linear-gradient(45deg, #ff416c, #ff6584);
        }

        /* Trigger Animasi Muncul */
        .show-text h1, .show-text p {
            opacity: 1;
            transform: translateY(0);
        }

        .show-text .photo-link {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto; /* Aktifkan klik setelah tombol muncul */
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container" id="text-container">
        <h1>Untuk Pacarku yang Paling Lucu 💖</h1>
        <p>Sama seperti bintik bintang ini yang tahu ke mana harus berjalan untuk membentuk cinta, dan mekar menjadi bunga yang indah... seperti itulah hatiku sejak ada kamu. 🌹</p>
        
        <a href="https://ibb.co.com/tPmMpFPz" target="_blank" class="photo-link">
            Klik di Sini Ada Kejutan Kecil ✨
        </a>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const textContainer = document.getElementById('text-container');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const numParticles = 500; 
        const particles = [];

        let animationState = 0; 

        // Alur Waktu Otomatis
        setTimeout(() => { animationState = 1; }, 2500);  // Detik 2.5: Jadi Love Pink
        setTimeout(() => { animationState = 2; }, 6500);  // Detik 6.5: Jadi Bunga Mawar
        setTimeout(() => { 
            textContainer.classList.add('show-text'); 
        }, 9500); // Detik 9.5: Teks & Tombol muncul bersamaan

        // --- Rumus Matematika Bentuk ---
        function getHeartPoint(t) {
            const scale = 12; 
            const x = scale * 16 * Math.pow(Math.sin(t), 3);
            const y = -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x + width / 2, y: y + height / 2 - 90 }; 
        }

        function getFlowerPoint(t, index) {
            let x, y;
            if (index % 6 === 0) {
                x = (index % 12 - 6) * 1.5;
                y = (index % 40) * 4 + 40; 
            } else {
                const k = 5; 
                const r = 140 * Math.sin(k * t); 
                x = r * Math.cos(t);
                y = r * Math.sin(t) - 30;
            }
            return { x: x + width / 2, y: y + height / 2 - 100 };
        }

        // --- Blueprint Partikel ---
        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1.2;
                this.speed = Math.random() * 0.03 + 0.02;
                this.color = { r: 240, g: 240, b: 245, a: 0.5 };
                this.t = (index / numParticles) * Math.PI * 2;
            }

            update() {
                let targetX, targetY;
                let targetColor = { r: 240, g: 240, b: 245, a: 0.5 };

                if (animationState === 0) {
                    this.x += Math.sin(this.index + Date.now() * 0.0015) * 0.4;
                    this.y += Math.cos(this.index + Date.now() * 0.0015) * 0.4;
                    return;
                } 
                else if (animationState === 1) {
                    const target = getHeartPoint(this.t);
                    targetX = target.x;
                    targetY = target.y;
                    targetColor = { r: 255, g: 20, b: 147, a: 0.85 }; 
                } 
                else if (animationState === 2) {
                    const target = getFlowerPoint(this.t, this.index);
                    targetX = target.x;
                    targetY = target.y;

                    if (this.index % 6 === 0) {
                        targetColor = { r: 46, g: 139, b: 87, a: 0.8 };
                    } else {
                        targetColor = { r: 230, g: 15, b: 60, a: 0.9 };
                    }
                }

                this.x += (targetX - this.x) * this.speed;
                this.y += (targetY - this.y) * this.speed;

                this.color.r += (targetColor.r - this.color.r) * 0.05;
                this.color.g += (targetColor.g - this.color.g) * 0.05;
                this.color.b += (targetColor.b - this.color.b) * 0.05;
                this.color.a += (targetColor.a - this.color.a) * 0.05;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${Math.floor(this.color.r)}, ${Math.floor(this.color.g)}, ${Math.floor(this.color.b)}, ${this.color.a})`;
                
                if (animationState > 0) {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fill();
            }
        }

        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle(i));
        }

        function animate() {
            ctx.fillStyle = 'rgba(11, 1, 4, 0.25)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
